<html>
<head>
<title>QFfilter</title>
<script src="../dist/qfiltr.js"></script>

<script type="text/javascript">

// create instance of qfiltr
var qFiltr = new qfiltr();

// a random number generator to exercise the functions
var generateRandom = function generateRandom(start, count) {   
    var amount = count || 100;
    var begin = start || 0;
    return Math.floor(Math.exp(Math.random()*Math.log(count+1)))+start;
};

// Function called when the Limit Run Button is pressed
var runFunc = function() {

    var state = document.getElementById("state");

    // call qFiltr.limit to test limiter using options 
    qFiltr.limit("limitTest", {}, function() {  
        console.log("Allow action"); 
        var node = document.createElement("LI");                 
        var textnode = document.createTextNode(generateRandom(0,10000000000000));   
        var container =  document.getElementById("filterResult");
        node.appendChild(textnode);                              
        container.insertBefore(node, container.firstChild);           
        state.innerHTML = "Status: OK";   
    }, function() { 
        console.log("Rate limit exceeded");
        state.innerHTML = "You're going too fast!";
    });  
  
};

// Function called when the Queue Run Button is pressed
var qFunc = function() {

    var qstate = document.getElementById("qstate");

    qFiltr.queue("queueTest", {queueTimer:1000, queueMax:20}, function() {
        console.log("Allow action"); 
        var node = document.createElement("LI");                 
        var textnode = document.createTextNode(generateRandom(0,10000000000000));   
        var container =  document.getElementById("qResult");
        node.appendChild(textnode);                              
        container.insertBefore(node, container.firstChild);           
        qstate.innerHTML = "Queue Running: " + qFiltr.qRunning["queueTest"] + 
            "<br>Queue Items: " + qFiltr.dataStore["queueTest"].length;    
    },
    function() { 
        console.log("Queue stopped");
        qstate.innerHTML = "Queue Running: " + qFiltr.qRunning["queueTest"]; 
    }, 
    function() {
        console.log("Queue maxed out!");
        qstate.innerHTML = "Queue Running: Queue Limit Reached";     
    });
};



var sendStop = 0
var overRate = false;
var testAdjuster = 0;

// send messages at random intervals
function sender(t) { 
    if (sendStop > 100) return;
    sendStop++;
    
    if (overRate) { testAdjuster = 20 }
    else { testAdjuster = 0}
    
    var messageNo = sendStop;
    setTimeout(function() {
        // generate new t
        var i = Math.floor(Math.exp(Math.random()*Math.log(51 + testAdjuster)));
        sendMessage("Message #" + messageNo + " sent at " + i*10 + "ms");
        // run again
        sender(i*10);
    }, t || 100);
}

function sendMessage(message) {

    var state = document.getElementById("comboState");

    // add message to qFiltr.queue with callback functions 
    qFiltr.qlimit("msgQ", {limitCount:10, limitTime:1000, queueTimer:100}, function() {
        console.log(message);
        var node = document.createElement("LI");                 
        var textnode = document.createTextNode(message);   
        var container =  document.getElementById("comboFilterResult");
        node.appendChild(textnode);                              
        container.insertBefore(node, container.firstChild);          
        state.innerHTML = "Status: OK";             
    }, function() {
        overRate = true;
        console.log("Rate limit exceeded, queuing data");
        state.innerHTML = "Rate limit exceeded, queuing data";      
    }, function() {
        overRate = false;
        console.log("Queue cleared resuming normal operation");   
        state.innerHTML = "Queue cleared resuming normal operation";     
    });  
}

function filterSmokeTests() {
    var resultsNode = document.getElementById("filterSmokeResults");
    var summaryNode = document.getElementById("filterSmokeSummary");
    var passCount = 0;
    var failCount = 0;

    function printResult(ok, label) {
        var node = document.createElement("LI");
        node.style.color = ok ? "#0a7f2e" : "#b00020";
        node.textContent = (ok ? "PASS: " : "FAIL: ") + label;
        resultsNode.appendChild(node);
        if (ok) {
            passCount++;
        }
        else {
            failCount++;
        }
    }

    // regex string matcher should be case-insensitive by default
    var regexAllowed = false;
    qFiltr.filter("smokeRegex", {message: "HELLO", regex: "hello"}, function() {
        regexAllowed = true;
    }, function() {});
    printResult(regexAllowed, "filter(regex string) allows case-insensitive match");

    // array matcher should allow when any token is present
    var arrayAllowed = false;
    qFiltr.filter("smokeArray", {message: "there is spam here", match: ["ham", "spam"]}, function() {
        arrayAllowed = true;
    }, function() {});
    printResult(arrayAllowed, "filter(match array) allows any matching token");

    // predicate matcher should route to fail when predicate returns false
    var predicateBlocked = false;
    qFiltr.filter("smokePredicate", {
        message: "safe",
        test: function(message) {
            return message === "unsafe";
        }
    }, function() {}, function() {
        predicateBlocked = true;
    });
    printResult(predicateBlocked, "filter(test) routes non-matches to fail callback");

    // missing matcher should throw
    var threw = false;
    try {
        qFiltr.filter("smokeThrow", {message: "hello"}, function() {}, function() {});
    }
    catch (err) {
        threw = true;
    }
    printResult(threw, "filter throws when no matcher is provided");

    summaryNode.innerHTML = "Filter Smoke Tests: " + passCount + " passed, " + failCount + " failed";
}

window.addEventListener('load', function() {
    filterSmokeTests();
});

</script>

</head>
<body>

<center><h2>Limit</h2></center>
<table align="center" width="600"><tr><td>
    <div id="filterResult" style="width:300px;height:200px;overflow:scroll"></div>
</td>
<td>
    <div id="state">Status: OK</div>
</td></tr></table>

<center>
    <button id="runner" onClick="runFunc()">Run Function</button>
</center>

<center><h2>Queue</h2></center>
<table align="center" width="600"><tr><td>
    <div id="qResult" style="width:300px;height:200px;overflow:scroll"></div>
</td>
<td>
    <div id="qstate">Queue Running: false</div>
</td></tr></table>

<center>
    <button id="qRunner" onClick="qFunc()">Run Function</button>
</center>


<center><h2>QLimit Combo</h2></center>
<table align="center" width="600"><tr><td>
    <div id="comboFilterResult" style="width:300px;height:200px;overflow:scroll"></div>
</td>
<td>
    <div id="comboState">Status: OK</div>
</td></tr></table>

<center>
    <button id="comboRunner" onClick="sender()">Run Function</button>
</center>

<center><h2>Filter Smoke Tests</h2></center>
<table align="center" width="600"><tr><td>
    <div id="filterSmokeSummary">Filter Smoke Tests: pending</div>
    <ul id="filterSmokeResults"></ul>
</td></tr></table>

</body>
</html>
